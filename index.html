<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pose Recorder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #111; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
  }

  /* ---------- Video / Canvas area ---------- */
  #media-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: #000; display: flex; align-items: center; justify-content: center;
  }
  #camera-video, #playback-video {
    position: absolute; width: 100%; height: 100%;
    object-fit: cover;
  }
  #overlay-canvas {
    position: absolute; width: 100%; height: 100%;
    pointer-events: none;
  }
  .hidden { display: none !important; }

  /* ---------- Controls ---------- */
  #controls {
    padding: 12px; display: flex; gap: 10px;
    justify-content: center; flex-shrink: 0;
    background: #222;
  }
  .btn {
    flex: 1; max-width: 200px;
    padding: 16px 0; border: none; border-radius: 12px;
    font-size: 1.2rem; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
    color: #fff;
  }
  .btn:active { opacity: .7; }
  .btn-record { background: #e53935; }
  .btn-stop   { background: #1e88e5; }
  .btn-clear  { background: #757575; }

  /* ---------- Overlay messages ---------- */
  #status-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.65);
    z-index: 10;
  }
  #status-overlay.hidden { display: none !important; }
  .spinner {
    width: 48px; height: 48px;
    border: 5px solid rgba(255,255,255,.3);
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status-text {
    font-size: 1.1rem; text-align: center;
    padding: 0 20px; line-height: 1.6;
  }
  #progress-bar-wrap {
    width: 70%; max-width: 300px;
    height: 8px; background: rgba(255,255,255,.2);
    border-radius: 4px; margin-top: 12px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%; background: #4caf50;
    border-radius: 4px; transition: width .15s;
  }

  /* ---------- Recording indicator ---------- */
  #rec-indicator {
    position: absolute; top: 12px; left: 12px;
    display: flex; align-items: center; gap: 6px;
    font-size: .9rem; font-weight: 700; z-index: 5;
  }
  #rec-indicator.hidden { display: none !important; }
  .rec-dot {
    width: 12px; height: 12px; background: #e53935;
    border-radius: 50%; animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app">
  <div id="media-wrap">
    <video id="camera-video" autoplay playsinline muted class="hidden"></video>
    <video id="playback-video" playsinline loop class="hidden"></video>
    <canvas id="overlay-canvas" class="hidden"></canvas>

    <div id="rec-indicator" class="hidden"><span class="rec-dot"></span>REC</div>

    <div id="status-overlay" class="hidden">
      <div class="spinner"></div>
      <div id="status-text"></div>
      <div id="progress-bar-wrap" class="hidden">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <div id="controls">
    <!-- buttons injected by JS depending on state -->
  </div>
</div>

<!-- MediaPipe Tasks Vision (WASM + model loaded at runtime) -->
<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

/* ============================================================
   State
   ============================================================ */
const STATE = { IDLE: 0, CAMERA: 1, RECORDING: 2, ANALYZING: 3, PLAYBACK: 4 };
let currentState = STATE.IDLE;

/* DOM refs */
const cameraVideo    = document.getElementById("camera-video");
const playbackVideo  = document.getElementById("playback-video");
const overlayCanvas  = document.getElementById("overlay-canvas");
const controlsDiv    = document.getElementById("controls");
const statusOverlay  = document.getElementById("status-overlay");
const statusText     = document.getElementById("status-text");
const progressWrap   = document.getElementById("progress-bar-wrap");
const progressBar    = document.getElementById("progress-bar");
const recIndicator   = document.getElementById("rec-indicator");

const ctx = overlayCanvas.getContext("2d");

let mediaStream   = null;
let mediaRecorder  = null;
let recordedChunks = [];
let poseData       = [];     // array of { time, landmarks[] }
let poseLandmarker = null;
let animFrameId    = null;

/* ============================================================
   IndexedDB helpers
   ============================================================ */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("PoseRecorderDB", 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains("videos"))    db.createObjectStore("videos");
      if (!db.objectStoreNames.contains("posedata"))   db.createObjectStore("posedata");
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
async function dbPut(store, key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    tx.objectStore(store).put(value, key);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror    = () => { db.close(); reject(tx.error); };
  });
}
async function dbGet(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, "readonly");
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => { db.close(); resolve(req.result); };
    req.onerror   = () => { db.close(); reject(req.error); };
  });
}
async function dbClearAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(["videos", "posedata"], "readwrite");
    tx.objectStore("videos").clear();
    tx.objectStore("posedata").clear();
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror    = () => { db.close(); reject(tx.error); };
  });
}

/* ============================================================
   MediaPipe initialisation
   ============================================================ */
async function ensurePoseLandmarker() {
  if (poseLandmarker) return;
  showStatus("MediaPipeモデルを読み込み中...");
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
  );
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numPoses: 1
  });
  hideStatus();
}

/* ============================================================
   UI helpers
   ============================================================ */
function showStatus(msg, showProgress = false) {
  statusOverlay.classList.remove("hidden");
  statusText.textContent = msg;
  progressWrap.classList.toggle("hidden", !showProgress);
  progressBar.style.width = "0%";
}
function setProgress(pct) {
  progressBar.style.width = pct + "%";
}
function hideStatus() {
  statusOverlay.classList.add("hidden");
}

function renderControls() {
  controlsDiv.innerHTML = "";
  if (currentState === STATE.IDLE) {
    controlsDiv.appendChild(makeBtn("録画", "btn-record", startCamera));
  } else if (currentState === STATE.CAMERA) {
    controlsDiv.appendChild(makeBtn("● 録画開始", "btn-record", startRecording));
  } else if (currentState === STATE.RECORDING) {
    controlsDiv.appendChild(makeBtn("■ 終了", "btn-stop", stopRecording));
  } else if (currentState === STATE.PLAYBACK) {
    controlsDiv.appendChild(makeBtn("クリア", "btn-clear", clearAll));
  }
}
function makeBtn(label, cls, handler) {
  const b = document.createElement("button");
  b.className = "btn " + cls;
  b.textContent = label;
  b.addEventListener("click", handler);
  return b;
}

/* ============================================================
   Flow: Camera
   ============================================================ */
async function startCamera() {
  showStatus("カメラを起動中...");
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
  } catch (e) {
    alert("カメラにアクセスできません: " + e.message);
    hideStatus();
    return;
  }
  cameraVideo.srcObject = mediaStream;
  cameraVideo.classList.remove("hidden");
  await cameraVideo.play();
  hideStatus();
  currentState = STATE.CAMERA;
  renderControls();
}

/* ============================================================
   Flow: Recording
   ============================================================ */
function startRecording() {
  recordedChunks = [];
  const mimeTypes = [
    "video/webm;codecs=vp9",
    "video/webm;codecs=vp8",
    "video/webm",
    "video/mp4"
  ];
  let mime = "";
  for (const m of mimeTypes) {
    if (MediaRecorder.isTypeSupported(m)) { mime = m; break; }
  }
  mediaRecorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : {});
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.start(100); // 100ms chunks
  currentState = STATE.RECORDING;
  recIndicator.classList.remove("hidden");
  renderControls();
}

async function stopRecording() {
  recIndicator.classList.add("hidden");
  await new Promise(resolve => {
    mediaRecorder.onstop = resolve;
    mediaRecorder.stop();
  });

  /* stop camera */
  mediaStream.getTracks().forEach(t => t.stop());
  cameraVideo.srcObject = null;
  cameraVideo.classList.add("hidden");

  const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || "video/webm" });

  /* Save video to IndexedDB */
  showStatus("動画をIndexedDBに保存中...");
  await dbPut("videos", "latest", blob);
  hideStatus();

  /* Analyse */
  currentState = STATE.ANALYZING;
  renderControls();
  await analyseVideo(blob);

  /* Save pose data */
  showStatus("解析データを保存中...");
  await dbPut("posedata", "latest", poseData);
  hideStatus();

  /* Playback */
  startPlayback(blob);
}

/* ============================================================
   Flow: Analyse with MediaPipe
   ============================================================ */
async function analyseVideo(blob) {
  await ensurePoseLandmarker();
  showStatus("ポーズ解析中... 0%", true);

  const url = URL.createObjectURL(blob);
  const tempVideo = document.createElement("video");
  tempVideo.src = url;
  tempVideo.muted = true;
  tempVideo.playsInline = true;
  tempVideo.preload = "auto";

  await new Promise((res, rej) => {
    tempVideo.onloadedmetadata = res;
    tempVideo.onerror = rej;
  });

  const duration = tempVideo.duration;
  const fps = 15; // analyse at 15 fps
  const interval = 1 / fps;
  const totalFrames = Math.floor(duration * fps);
  poseData = [];

  for (let i = 0; i <= totalFrames; i++) {
    const time = Math.min(i * interval, duration);
    tempVideo.currentTime = time;
    await new Promise(r => { tempVideo.onseeked = r; });

    const result = poseLandmarker.detectForVideo(tempVideo, Math.round(time * 1000));
    if (result.landmarks && result.landmarks.length > 0) {
      poseData.push({ time, landmarks: result.landmarks[0] });
    } else {
      poseData.push({ time, landmarks: null });
    }
    const pct = Math.round(((i + 1) / (totalFrames + 1)) * 100);
    statusText.textContent = "ポーズ解析中... " + pct + "%";
    setProgress(pct);
  }

  URL.revokeObjectURL(url);
  hideStatus();
}

/* ============================================================
   Flow: Playback with skeleton overlay
   ============================================================ */
function startPlayback(blob) {
  const url = URL.createObjectURL(blob);
  playbackVideo.src = url;
  playbackVideo.classList.remove("hidden");
  overlayCanvas.classList.remove("hidden");
  playbackVideo.play();

  currentState = STATE.PLAYBACK;
  renderControls();
  drawLoop();
}

/* Connections (MediaPipe Pose 33 landmarks) */
const POSE_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,7],
  [0,4],[4,5],[5,6],[6,8],
  [9,10],
  [11,12],
  [11,13],[13,15],[15,17],[15,19],[15,21],
  [12,14],[14,16],[16,18],[16,20],[16,22],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[27,29],[27,31],
  [24,26],[26,28],[28,30],[28,32]
];

function drawLoop() {
  animFrameId = requestAnimationFrame(drawLoop);

  const vw = playbackVideo.videoWidth;
  const vh = playbackVideo.videoHeight;
  if (!vw || !vh) return;

  /* match canvas to displayed size */
  const rect = playbackVideo.getBoundingClientRect();
  if (overlayCanvas.width !== rect.width || overlayCanvas.height !== rect.height) {
    overlayCanvas.width  = rect.width;
    overlayCanvas.height = rect.height;
  }

  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  const t = playbackVideo.currentTime;
  const frame = findClosestFrame(t);
  if (!frame || !frame.landmarks) return;

  /* Compute object-fit: cover mapping */
  const displayW = overlayCanvas.width;
  const displayH = overlayCanvas.height;
  const videoAspect = vw / vh;
  const displayAspect = displayW / displayH;
  let sx, sy, sw, sh;
  if (videoAspect > displayAspect) {
    // video wider → crop sides
    sh = vh;
    sw = vh * displayAspect;
    sx = (vw - sw) / 2;
    sy = 0;
  } else {
    sw = vw;
    sh = vw / displayAspect;
    sx = 0;
    sy = (vh - sh) / 2;
  }

  const lm = frame.landmarks;

  function toXY(p) {
    const px = p.x * vw;
    const py = p.y * vh;
    const x = ((px - sx) / sw) * displayW;
    const y = ((py - sy) / sh) * displayH;
    return [x, y];
  }

  /* Draw connections */
  ctx.strokeStyle = "#00e676";
  ctx.lineWidth = 3;
  for (const [a, b] of POSE_CONNECTIONS) {
    if (a >= lm.length || b >= lm.length) continue;
    const pa = lm[a], pb = lm[b];
    if (pa.visibility < 0.3 || pb.visibility < 0.3) continue;
    const [x1, y1] = toXY(pa);
    const [x2, y2] = toXY(pb);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  /* Draw joints */
  ctx.fillStyle = "#000";
  for (let i = 0; i < lm.length; i++) {
    if (lm[i].visibility < 0.3) continue;
    const [x, y] = toXY(lm[i]);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function findClosestFrame(t) {
  if (!poseData.length) return null;
  let best = poseData[0], bestDiff = Math.abs(t - best.time);
  for (let i = 1; i < poseData.length; i++) {
    const d = Math.abs(t - poseData[i].time);
    if (d < bestDiff) { best = poseData[i]; bestDiff = d; }
  }
  return best;
}

/* ============================================================
   Flow: Clear
   ============================================================ */
async function clearAll() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  playbackVideo.pause();
  playbackVideo.removeAttribute("src");
  playbackVideo.classList.add("hidden");
  overlayCanvas.classList.add("hidden");
  poseData = [];

  showStatus("データを削除中...");
  await dbClearAll();
  hideStatus();

  currentState = STATE.IDLE;
  renderControls();
}

/* ============================================================
   Check for existing data on load
   ============================================================ */
async function init() {
  const savedBlob = await dbGet("videos", "latest").catch(() => null);
  const savedPose = await dbGet("posedata", "latest").catch(() => null);
  if (savedBlob && savedPose) {
    poseData = savedPose;
    startPlayback(savedBlob);
  } else {
    currentState = STATE.IDLE;
    renderControls();
  }
}

init();
</script>
</body>
</html>
