<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pose Recorder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #111; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
  }
  #media-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: #000; display: flex; align-items: center; justify-content: center;
  }
  #camera-video, #playback-video {
    position: absolute; width: 100%; height: 100%;
    object-fit: contain;
  }
  #overlay-canvas {
    position: absolute; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .hidden { display: none !important; }
  #controls {
    padding: 12px; display: flex; gap: 10px;
    justify-content: center; flex-shrink: 0;
    background: #222;
  }
  .btn {
    flex: 1; max-width: 200px;
    padding: 16px 0; border: none; border-radius: 12px;
    font-size: 1.2rem; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
    color: #fff;
  }
  .btn:active { opacity: .7; }
  .btn-record { background: #e53935; }
  .btn-stop   { background: #1e88e5; }
  .btn-clear  { background: #757575; }
  #status-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.65);
    z-index: 10;
  }
  #status-overlay.hidden { display: none !important; }
  .spinner {
    width: 48px; height: 48px;
    border: 5px solid rgba(255,255,255,.3);
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status-text {
    font-size: 1.1rem; text-align: center;
    padding: 0 20px; line-height: 1.6;
  }
  #progress-bar-wrap {
    width: 70%; max-width: 300px;
    height: 8px; background: rgba(255,255,255,.2);
    border-radius: 4px; margin-top: 12px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%; background: #4caf50;
    border-radius: 4px; transition: width .15s;
  }
  #rec-indicator {
    position: absolute; top: 12px; left: 12px;
    display: flex; align-items: center; gap: 6px;
    font-size: .9rem; font-weight: 700; z-index: 5;
  }
  #rec-indicator.hidden { display: none !important; }
  .rec-dot {
    width: 12px; height: 12px; background: #e53935;
    border-radius: 50%; animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #debug-info {
    position: absolute; bottom: 4px; left: 4px;
    font-size: 0.65rem; color: rgba(255,255,255,.5);
    z-index: 3; pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="media-wrap">
    <video id="camera-video" autoplay playsinline muted class="hidden"></video>
    <video id="playback-video" playsinline loop class="hidden"></video>
    <canvas id="overlay-canvas" class="hidden"></canvas>
    <div id="rec-indicator" class="hidden"><span class="rec-dot"></span>REC</div>
    <div id="status-overlay" class="hidden">
      <div class="spinner"></div>
      <div id="status-text"></div>
      <div id="progress-bar-wrap" class="hidden">
        <div id="progress-bar"></div>
      </div>
    </div>
    <div id="debug-info"></div>
  </div>
  <div id="controls"></div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

const STATE = { IDLE: 0, CAMERA: 1, RECORDING: 2, ANALYZING: 3, PLAYBACK: 4 };
let currentState = STATE.IDLE;

const cameraVideo    = document.getElementById("camera-video");
const playbackVideo  = document.getElementById("playback-video");
const overlayCanvas  = document.getElementById("overlay-canvas");
const controlsDiv    = document.getElementById("controls");
const statusOverlay  = document.getElementById("status-overlay");
const statusText     = document.getElementById("status-text");
const progressWrap   = document.getElementById("progress-bar-wrap");
const progressBar    = document.getElementById("progress-bar");
const recIndicator   = document.getElementById("rec-indicator");
const debugInfo      = document.getElementById("debug-info");
const ctx = overlayCanvas.getContext("2d");

let mediaStream = null, mediaRecorder = null, recordedChunks = [];
let poseData = [], poseLandmarker = null, animFrameId = null;

/* IndexedDB */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("PoseRecorderDB", 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains("videos")) db.createObjectStore("videos");
      if (!db.objectStoreNames.contains("posedata")) db.createObjectStore("posedata");
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbPut(store, key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    tx.objectStore(store).put(value, key);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}
async function dbGet(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const r = tx.objectStore(store).get(key);
    r.onsuccess = () => { db.close(); resolve(r.result); };
    r.onerror = () => { db.close(); reject(r.error); };
  });
}
async function dbClearAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(["videos", "posedata"], "readwrite");
    tx.objectStore("videos").clear();
    tx.objectStore("posedata").clear();
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}

/* MediaPipe - GPU then CPU fallback */
async function ensurePoseLandmarker() {
  if (poseLandmarker) return;
  showStatus("MediaPipe\u30e2\u30c7\u30eb\u3092\u8aad\u307f\u8fbc\u307f\u4e2d...");
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
  );
  for (const delegate of ["GPU", "CPU"]) {
    try {
      poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          delegate: delegate
        },
        runningMode: "VIDEO",
        numPoses: 1
      });
      console.log("PoseLandmarker delegate:", delegate);
      break;
    } catch (e) {
      console.warn("Delegate " + delegate + " failed:", e);
      if (delegate === "CPU") throw e;
    }
  }
  hideStatus();
}

/* UI */
function showStatus(msg, showProgress) {
  statusOverlay.classList.remove("hidden");
  statusText.textContent = msg;
  progressWrap.classList.toggle("hidden", !showProgress);
  progressBar.style.width = "0%";
}
function setProgress(pct) { progressBar.style.width = pct + "%"; }
function hideStatus() { statusOverlay.classList.add("hidden"); }

function renderControls() {
  controlsDiv.innerHTML = "";
  if (currentState === STATE.IDLE) controlsDiv.appendChild(makeBtn("\u9332\u753b", "btn-record", startCamera));
  else if (currentState === STATE.CAMERA) controlsDiv.appendChild(makeBtn("\u25cf \u9332\u753b\u958b\u59cb", "btn-record", startRecording));
  else if (currentState === STATE.RECORDING) controlsDiv.appendChild(makeBtn("\u25a0 \u7d42\u4e86", "btn-stop", stopRecording));
  else if (currentState === STATE.PLAYBACK) controlsDiv.appendChild(makeBtn("\u30af\u30ea\u30a2", "btn-clear", clearAll));
}
function makeBtn(label, cls, handler) {
  const b = document.createElement("button");
  b.className = "btn " + cls;
  b.textContent = label;
  b.addEventListener("click", handler);
  return b;
}

/* Camera */
async function startCamera() {
  showStatus("\u30ab\u30e1\u30e9\u3092\u8d77\u52d5\u4e2d...");
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
  } catch (e) {
    alert("\u30ab\u30e1\u30e9\u306b\u30a2\u30af\u30bb\u30b9\u3067\u304d\u307e\u305b\u3093: " + e.message);
    hideStatus(); return;
  }
  cameraVideo.srcObject = mediaStream;
  cameraVideo.classList.remove("hidden");
  await cameraVideo.play();
  hideStatus();
  currentState = STATE.CAMERA;
  renderControls();
}

/* Recording */
function startRecording() {
  recordedChunks = [];
  const mimeTypes = ["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm","video/mp4"];
  let mime = "";
  for (const m of mimeTypes) { if (MediaRecorder.isTypeSupported(m)) { mime = m; break; } }
  mediaRecorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : {});
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.start(100);
  currentState = STATE.RECORDING;
  recIndicator.classList.remove("hidden");
  renderControls();
}

async function stopRecording() {
  recIndicator.classList.add("hidden");
  await new Promise(resolve => { mediaRecorder.onstop = resolve; mediaRecorder.stop(); });
  mediaStream.getTracks().forEach(t => t.stop());
  cameraVideo.srcObject = null;
  cameraVideo.classList.add("hidden");
  const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || "video/webm" });

  showStatus("\u52d5\u753b\u3092IndexedDB\u306b\u4fdd\u5b58\u4e2d...");
  await dbPut("videos", "latest", blob);
  hideStatus();

  currentState = STATE.ANALYZING;
  renderControls();
  await analyseVideo(blob);

  showStatus("\u89e3\u6790\u30c7\u30fc\u30bf\u3092\u4fdd\u5b58\u4e2d...");
  await dbPut("posedata", "latest", poseData);
  hideStatus();

  startPlayback(blob);
}

/* Clone landmarks to plain JSON for IndexedDB */
function cloneLandmarks(landmarks) {
  return landmarks.map(function(p) {
    return { x: p.x, y: p.y, z: p.z, visibility: (p.visibility !== undefined ? p.visibility : 1.0) };
  });
}

/* Seek helper - attach listener BEFORE setting currentTime, with safety timeout */
function seekTo(video, time) {
  return new Promise(function(resolve) {
    var done = false;
    var timer = setTimeout(function() { if (!done) { done = true; resolve(); } }, 2000);
    function onSeeked() {
      if (done) return;
      done = true;
      clearTimeout(timer);
      video.removeEventListener("seeked", onSeeked);
      setTimeout(resolve, 30);
    }
    video.addEventListener("seeked", onSeeked);
    video.currentTime = time;
  });
}

/* Analyse */
async function analyseVideo(blob) {
  await ensurePoseLandmarker();
  showStatus("\u30dd\u30fc\u30ba\u89e3\u6790\u4e2d... 0%", true);

  const url = URL.createObjectURL(blob);
  const tempVideo = document.createElement("video");
  tempVideo.src = url;
  tempVideo.muted = true;
  tempVideo.setAttribute("playsinline", "");
  tempVideo.preload = "auto";

  await new Promise(function(res, rej) { tempVideo.onloadeddata = res; tempVideo.onerror = rej; });

  // Play then pause to init decoder (important on mobile)
  try { await tempVideo.play(); tempVideo.pause(); } catch(e) { console.warn("play/pause:", e); }

  const duration = tempVideo.duration;
  const fps = 10;
  const interval = 1 / fps;
  const totalFrames = Math.floor(duration * fps);
  poseData = [];
  let detectedCount = 0;
  let lastTs = -1;

  for (let i = 0; i <= totalFrames; i++) {
    const time = Math.min(i * interval, duration - 0.01);
    await seekTo(tempVideo, time);

    let ts = Math.round(time * 1000);
    if (ts <= lastTs) ts = lastTs + 1;
    lastTs = ts;

    try {
      const result = poseLandmarker.detectForVideo(tempVideo, ts);
      if (result.landmarks && result.landmarks.length > 0) {
        poseData.push({ time: time, landmarks: cloneLandmarks(result.landmarks[0]) });
        detectedCount++;
      } else {
        poseData.push({ time: time, landmarks: null });
      }
    } catch (e) {
      console.warn("detect err frame " + i, e);
      poseData.push({ time: time, landmarks: null });
    }

    const pct = Math.round(((i + 1) / (totalFrames + 1)) * 100);
    statusText.textContent = "\u30dd\u30fc\u30ba\u89e3\u6790\u4e2d... " + pct + "%";
    setProgress(pct);
    /* yield to UI thread so progress bar updates */
    if (i % 3 === 0) await new Promise(function(r) { setTimeout(r, 0); });
  }

  URL.revokeObjectURL(url);
  hideStatus();
  debugInfo.textContent = detectedCount + "/" + (totalFrames + 1) + " frames detected";
}

/* Playback */
function startPlayback(blob) {
  const url = URL.createObjectURL(blob);
  playbackVideo.src = url;
  playbackVideo.classList.remove("hidden");
  overlayCanvas.classList.remove("hidden");
  playbackVideo.play();
  currentState = STATE.PLAYBACK;
  renderControls();
  drawLoop();
}

const POSE_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10],[11,12],
  [11,13],[13,15],[15,17],[15,19],[15,21],[12,14],[14,16],[16,18],[16,20],[16,22],
  [11,23],[12,24],[23,24],[23,25],[25,27],[27,29],[27,31],[24,26],[26,28],[28,30],[28,32]
];

function drawLoop() {
  animFrameId = requestAnimationFrame(drawLoop);
  const vw = playbackVideo.videoWidth, vh = playbackVideo.videoHeight;
  if (!vw || !vh) return;

  const rect = playbackVideo.getBoundingClientRect();
  const cw = Math.round(rect.width), ch = Math.round(rect.height);
  if (overlayCanvas.width !== cw || overlayCanvas.height !== ch) {
    overlayCanvas.width = cw;
    overlayCanvas.height = ch;
  }
  ctx.clearRect(0, 0, cw, ch);

  const t = playbackVideo.currentTime;
  const frame = findClosestFrame(t);
  if (!frame || !frame.landmarks) return;

  /* object-fit: contain mapping */
  const videoAspect = vw / vh, displayAspect = cw / ch;
  let drawW, drawH, offsetX, offsetY;
  if (videoAspect > displayAspect) {
    drawW = cw; drawH = cw / videoAspect; offsetX = 0; offsetY = (ch - drawH) / 2;
  } else {
    drawH = ch; drawW = ch * videoAspect; offsetX = (cw - drawW) / 2; offsetY = 0;
  }

  const lm = frame.landmarks;
  function toXY(p) { return [offsetX + p.x * drawW, offsetY + p.y * drawH]; }

  /* Green lines */
  ctx.strokeStyle = "#00e676";
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  for (const [a, b] of POSE_CONNECTIONS) {
    if (a >= lm.length || b >= lm.length) continue;
    const pa = lm[a], pb = lm[b];
    if (pa.visibility < 0.15 || pb.visibility < 0.15) continue;
    const [x1, y1] = toXY(pa), [x2, y2] = toXY(pb);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

  /* Green dots */
  ctx.fillStyle = "#00e676";
  for (let i = 0; i < lm.length; i++) {
    if (lm[i].visibility < 0.15) continue;
    const [x, y] = toXY(lm[i]);
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
  }
}

function findClosestFrame(t) {
  if (!poseData.length) return null;
  let best = poseData[0], bestDiff = Math.abs(t - best.time);
  for (let i = 1; i < poseData.length; i++) {
    const d = Math.abs(t - poseData[i].time);
    if (d < bestDiff) { best = poseData[i]; bestDiff = d; }
  }
  return best;
}

/* Clear */
async function clearAll() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  playbackVideo.pause();
  playbackVideo.removeAttribute("src");
  playbackVideo.classList.add("hidden");
  overlayCanvas.classList.add("hidden");
  poseData = [];
  debugInfo.textContent = "";
  showStatus("\u30c7\u30fc\u30bf\u3092\u524a\u9664\u4e2d...");
  await dbClearAll();
  hideStatus();
  currentState = STATE.IDLE;
  renderControls();
}

/* Init */
async function init() {
  const savedBlob = await dbGet("videos", "latest").catch(function() { return null; });
  const savedPose = await dbGet("posedata", "latest").catch(function() { return null; });
  if (savedBlob && savedPose && savedPose.length > 0) {
    poseData = savedPose;
    const detected = savedPose.filter(function(f) { return f.landmarks !== null; }).length;
    debugInfo.textContent = detected + "/" + savedPose.length + " frames (cached)";
    startPlayback(savedBlob);
  } else {
    currentState = STATE.IDLE;
    renderControls();
  }
}
init();
</script>
</body>
</html>
